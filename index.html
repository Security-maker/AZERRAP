<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050A13" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sentinelle" />
  <title>Sentinelle Pro — Portail opérationnel sécurisé</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQY7Wsj7dDtkZcaM5yr9ggE98u+28U8=" crossorigin="" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app" class="app-loading">
    <div class="boot-card">
      <img src="assets/logo.png" alt="Sentinelle Pro" class="boot-logo" />
      <div class="boot-title">Sentinelle Pro</div>
      <div class="boot-subtitle">Portail opérationnel sécurisé</div>
      <div class="loader-line"><span></span></div>
    </div>
  </div>

  <div id="toast-root" class="toast-root"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    window.__SENTINELLE_RENDERED = false;
    window.addEventListener('error', function(event) {
      console.error('[Sentinelle boot error]', event.error || event.message);
    });
    setTimeout(function(){
      var app = document.getElementById('app');
      if (!window.__SENTINELLE_RENDERED && app && app.classList.contains('app-loading')) {
        app.className = '';
        app.innerHTML = '<div class="login-page"><section class="login-card"><img src="assets/logo.png" class="login-logo" alt="Sentinelle Pro"><h1>Démarrage bloqué</h1><p class="subtitle">Cache ou script externe bloqué</p><div class="setup-box">L\'application n\'a pas terminé son démarrage. Clique sur le bouton ci-dessous pour vider le cache local puis recharge la page.</div><button class="btn primary full" id="sentinelle-reset-cache">Nettoyer et relancer</button><p class="muted" style="margin-top:12px;font-size:12px">Si le problème continue, ouvre le lien avec ?fresh=541.</p></section></div>';
        document.getElementById('sentinelle-reset-cache')?.addEventListener('click', async function(){
          try {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r){ return r.unregister(); }));
            }
            if (window.caches) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function(k){ return caches.delete(k); }));
            }
          } catch(e) {}
          location.href = location.pathname + '?fresh=541';
        });
      }
    }, 9000);
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
